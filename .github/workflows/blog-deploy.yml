name: Deploy Blog to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'apps/blog/**'
      - 'libs/foundation/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'nx.json'
      - 'tsconfig.base.json'
  workflow_dispatch:

concurrency:
  group: deploy-blog-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL: '1'
  CI: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm nx test blog

      - name: Build application
        working-directory: apps/blog
        run: pnpm build

      - name: Verify Vercel build output
        working-directory: apps/blog
        run: test -d .vercel/output

      - name: Stage prebuilt output for Vercel CLI
        run: |
          mkdir -p .vercel
          cp -r apps/blog/.vercel/output .vercel/output

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
