name: Blog CI

on:
  pull_request:
    paths:
      - 'apps/blog/**'
      - 'libs/foundation/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'nx.json'
      - 'tsconfig.base.json'

concurrency:
  group: blog-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm nx test:coverage blog

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: blog-coverage
          path: apps/blog/coverage/
          retention-days: 14

      - name: Coverage summary
        run: |
          node --input-type=module <<'EOF'
          import { appendFileSync, readFileSync } from 'node:fs';

          const summary = JSON.parse(
            readFileSync('apps/blog/coverage/coverage-summary.json', 'utf8'),
          ).total;

          const line = (label, metric) =>
            `- ${label}: ${metric.pct}% (${metric.covered}/${metric.total})`;

          const body = [
            '## Blog test coverage',
            line('Statements', summary.statements),
            line('Branches', summary.branches),
            line('Functions', summary.functions),
            line('Lines', summary.lines),
          ].join('\n');

          console.log(body);

          if (process.env.GITHUB_STEP_SUMMARY) {
            appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${body}\n`);
          }
          EOF

      - name: Build
        run: pnpm nx build blog --skip-nx-cache
